version: '3.8'

services:
  frontend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - ML_API_URL=http://ml-api:8001
    depends_on:
      - ml-api

  ml-api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.ml_api
    ports:
      - "8001:8001"
