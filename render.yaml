services:
  - type: web
    name: gridwise-backend
    env: python
    plan: free
    buildCommand: "bash scripts/render_build.sh"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: FRONTEND_URL
        sync: false
      - key: DAGSHUB_USER_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
