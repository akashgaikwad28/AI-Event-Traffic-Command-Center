version: 1
disable_existing_loggers: false

formatters:
  json:
    (): structlog.stdlib.ProcessorFormatter
    processor: structlog.processors.JSONRenderer
  console:
    (): structlog.stdlib.ProcessorFormatter
    processor: structlog.dev.ConsoleRenderer

handlers:
  console:
    class: logging.StreamHandler
    formatter: console
    level: DEBUG
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    formatter: json
    level: INFO
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 5

loggers:
  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false
  backend:
    level: DEBUG
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console]
